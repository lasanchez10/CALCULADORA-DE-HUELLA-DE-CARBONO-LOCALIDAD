<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Huella de Carbono - Localidades Bogotá</title>
    <!-- Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código directamente en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Componente de Icono adaptable para Lucide
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const LOCALIDADES_BOGOTA = [
            "Usaquén", "Chapinero", "Santa Fe", "San Cristóbal", "Usme", 
            "Tunjuelito", "Bosa", "Kennedy", "Fontibón", "Engativá", 
            "Suba", "Barrios Unidos", "Teusaquillo", "Los Mártires", 
            "Antonio Nariño", "Puente Aranda", "La Candelaria", 
            "Rafael Uribe Uribe", "Ciudad Bolívar", "Sumapaz"
        ];

        const App = () => {
            const [localidad, setLocalidad] = useState('Suba');
            const [poblacion, setPoblacion] = useState(1300000);
            const [respuestas, setRespuestas] = useState({
                vehiculos: 225000,
                motos: 50000,
                kilometraje: 12500,
                energia: 150,
                agua: 90,
                residuos: 400000,
                arboles: 350000
            });

            const FE_GASOLINA = 2.31; 
            const FE_ENERGIA = 0.1;   
            const FE_AGUA = 0.3;      
            const FE_RESIDUOS = 0.45; 
            const CAPTURA_ARBOL = 20; 

            const resultados = useMemo(() => {
                const litrosEstimados = (respuestas.vehiculos + respuestas.motos) * (respuestas.kilometraje / 10.5);
                const co2Transporte = (litrosEstimados * FE_GASOLINA) / 1000;
                const viviendas = poblacion / 4;
                const co2Energia = (viviendas * respuestas.energia * 12 * FE_ENERGIA) / 1000;
                const m3Anuales = (poblacion * respuestas.agua * 365) / 1000;
                const co2Agua = (m3Anuales * FE_AGUA) / 1000;
                const co2Residuos = respuestas.residuos * FE_RESIDUOS;
                const capturaTotal = (respuestas.arboles * CAPTURA_ARBOL) / 1000;

                const huellaTotal = co2Transporte + co2Energia + co2Agua + co2Residuos - capturaTotal;
                const huellaPerCapita = poblacion > 0 ? huellaTotal / poblacion : 0;

                return {
                    transporte: co2Transporte,
                    energia: co2Energia,
                    agua: co2Agua,
                    residuos: co2Residuos,
                    captura: capturaTotal,
                    total: huellaTotal,
                    perCapita: huellaPerCapita
                };
            }, [respuestas, poblacion]);

            const handleSelect = (field, value) => {
                setRespuestas(prev => ({ ...prev, [field]: value }));
            };

            const MetricRow = ({ label, value, total, color, iconName }) => {
                const percentage = Math.max(0, Math.min(100, (value / (total + 1)) * 100));
                return (
                    <div className="space-y-2">
                        <div className="flex justify-between text-[11px] font-bold">
                            <span className="text-slate-500 flex items-center gap-1">
                                <Icon name={iconName} size={12} /> {label}
                            </span>
                            <span className="text-slate-800">{Math.round(value).toLocaleString()} t CO₂e</span>
                        </div>
                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden flex">
                            <div 
                                className={`h-full transition-all duration-700 ease-out ${color}`} 
                                style={{ width: `${percentage}%` }}
                            />
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="bg-emerald-800 text-white p-8 rounded-3xl shadow-xl mb-8 relative overflow-hidden">
                            <div className="relative z-10">
                                <h1 className="text-3xl md:text-4xl font-black mb-2">Calculadora de Huella Territorial</h1>
                                <p className="text-emerald-100 opacity-90 max-w-2xl font-medium">
                                    Evaluación de emisiones de CO₂e para las localidades de Bogotá D.C.
                                </p>
                            </div>
                            <div className="absolute top-0 right-0 p-8 opacity-10">
                                <Icon name="calculator" size={160} />
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            <div className="lg:col-span-7 space-y-6">
                                {/* CONFIGURACIÓN */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-2 mb-4 text-emerald-700">
                                        <Icon name="building-2" />
                                        <h2 className="text-lg font-bold uppercase">Configuración Territorial</h2>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label className="text-sm font-bold text-slate-600 mb-2 block">Seleccionar Localidad</label>
                                            <select 
                                                value={localidad}
                                                onChange={(e) => setLocalidad(e.target.value)}
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium"
                                            >
                                                {LOCALIDADES_BOGOTA.map(loc => <option key={loc} value={loc}>{loc}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold text-slate-600 mb-2 block">Habitantes</label>
                                            <input 
                                                type="number"
                                                value={poblacion}
                                                onChange={(e) => setPoblacion(Number(e.target.value))}
                                                className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none font-medium"
                                            />
                                        </div>
                                    </div>
                                </div>

                                {/* INPUTS DE CONSUMO */}
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 space-y-8">
                                    {/* Transporte */}
                                    <section>
                                        <div className="flex items-center gap-2 mb-4 text-blue-600">
                                            <Icon name="car" /> <h2 className="font-bold uppercase">Transporte</h2>
                                        </div>
                                        <label className="text-sm font-semibold block mb-2 text-slate-600">Vehículos particulares:</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {[
                                                { label: '< 200k', val: 150000 },
                                                { label: '200k-250k', val: 225000 },
                                                { label: '> 250k', val: 300000 }
                                            ].map(opt => (
                                                <button key={opt.label} onClick={() => handleSelect('vehiculos', opt.val)} className={`py-2 px-3 text-sm rounded-lg border ${respuestas.vehiculos === opt.val ? 'bg-blue-600 text-white shadow-md' : 'bg-white border-slate-200 hover:border-blue-400'}`}>{opt.label}</button>
                                            ))}
                                        </div>
                                    </section>

                                    {/* Energía y Agua */}
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <section>
                                            <div className="flex items-center gap-2 mb-4 text-yellow-600">
                                                <Icon name="zap" /> <h2 className="font-bold uppercase">Energía</h2>
                                            </div>
                                            <div className="space-y-2">
                                                {[{ label: 'Bajo', val: 80 }, { label: 'Medio', val: 150 }, { label: 'Alto', val: 250 }].map(opt => (
                                                    <button key={opt.label} onClick={() => handleSelect('energia', opt.val)} className={`w-full py-2 px-3 text-left text-sm rounded-lg border ${respuestas.energia === opt.val ? 'bg-yellow-500 text-white' : 'bg-white border-slate-200'}`}>{opt.label}</button>
                                                ))}
                                            </div>
                                        </section>
                                        <section>
                                            <div className="flex items-center gap-2 mb-4 text-cyan-600">
                                                <Icon name="droplets" /> <h2 className="font-bold uppercase">Agua</h2>
                                            </div>
                                            <div className="space-y-2">
                                                {[{ label: 'Ahorro', val: 70 }, { label: 'Promedio', val: 90 }, { label: 'Exceso', val: 120 }].map(opt => (
                                                    <button key={opt.label} onClick={() => handleSelect('agua', opt.val)} className={`w-full py-2 px-3 text-left text-sm rounded-lg border ${respuestas.agua === opt.val ? 'bg-cyan-500 text-white' : 'bg-white border-slate-200'}`}>{opt.label}</button>
                                                ))}
                                            </div>
                                        </section>
                                    </div>
                                </div>
                            </div>

                            {/* RESULTADOS */}
                            <div className="lg:col-span-5">
                                <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-200 sticky top-8 space-y-6">
                                    <div className="text-center p-8 bg-slate-900 text-white rounded-3xl shadow-2xl">
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Huella Local Anual</p>
                                        <h3 className="text-5xl font-black">{Math.round(resultados.total).toLocaleString()}</h3>
                                        <span className="text-emerald-400 font-bold text-sm">t CO₂e / año</span>
                                    </div>

                                    <div className="flex items-center justify-between p-5 bg-emerald-50 border border-emerald-100 rounded-2xl">
                                        <p className="text-emerald-800 text-xs font-black uppercase">Huella Individual</p>
                                        <div className="text-right">
                                            <span className="text-3xl font-black text-emerald-900">{resultados.perCapita.toFixed(2)}</span>
                                            <span className="text-xs font-bold text-emerald-700 ml-1">t/hab</span>
                                        </div>
                                    </div>

                                    <div className="space-y-4">
                                        <MetricRow label="Transporte" value={resultados.transporte} total={resultados.total} color="bg-blue-500" iconName="car" />
                                        <MetricRow label="Residuos" value={resultados.residuos} total={resultados.total} color="bg-orange-500" iconName="trash-2" />
                                        <MetricRow label="Energía" value={resultados.energia} total={resultados.total} color="bg-yellow-500" iconName="zap" />
                                        <MetricRow label="Agua" value={resultados.agua} total={resultados.total} color="bg-cyan-500" iconName="droplets" />
                                    </div>
                                    
                                    <div className="bg-emerald-500/10 p-3 rounded-xl border border-emerald-500/20 flex justify-between">
                                        <div className="flex items-center gap-2">
                                            <Icon name="tree-deciduous" className="text-emerald-600" size={16} />
                                            <span className="text-xs font-bold text-emerald-800">Compensación Árboles</span>
                                        </div>
                                        <span className="font-black text-emerald-700 text-sm">-{Math.round(resultados.captura).toLocaleString()} t</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
